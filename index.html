<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çiftlik Kuralım</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #222;
            width: 100%;
            height: 100%;
        }

        #game-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1920px;
            height: 1080px;
            background-color: white;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
        }

        #game-area {
            position: absolute;
            top: 80px;
            left: 0;
            width: 1920px;
            height: 1000px;
            background: #eef2f3 url('assets/bg_farm.png?v=2');
            background-size: cover;
            overflow: hidden;
        }

        #bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1000px;
            z-index: 1;
            pointer-events: none;
        }

        /* Çiftlik Yapıları */
        .structure {
            position: absolute;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(50px) scale(0.8);
            pointer-events: none; /* Varsayılan olarak kapalı */
        }
        .structure.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        #windmill       { width: 240px; top: 160px; left: 1530px; z-index: 10; }
        #coop           { width: 300px; top: 480px; left: 180px;  z-index: 20; }
        #orchard        { width: 110px; top: 560px; left: 330px;  z-index: 25; }
        #greenhouse     { width: 350px; top: 250px; left: 1020px; z-index: 15; }
        #horse_paddock  { width: 380px; top: 520px; left: 1250px; z-index: 30; }
        #farmhouse      { width: 450px; top: 350px; left: 1450px; z-index: 21; }

        /* PANELLER */
        #question-panel {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            text-align: center;
            z-index: 100;
            border: 8px solid #0DBFC7;
            transition: all 0.3s ease;
        }

        #instruction-panel {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 850px;
            background: rgba(13, 191, 199, 0.95);
            color: white;
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 101;
            border: 4px solid white;
            display: none;
            font-size: 32px;
            font-weight: 800;
        }

        #confirm-panel {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 25px 50px;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            gap: 30px;
            z-index: 1000;
            border: 6px solid #0DBFC7;
        }

        #question-text {
            font-size: 28px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 3px solid #e9ecef;
            border-radius: 20px;
            padding: 20px;
            font-size: 22px;
            font-weight: 700;
            color: #495057;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            transform: translateY(-5px);
            background: #fff;
            border-color: #0DBFC7;
            box-shadow: 0 10px 20px rgba(13, 191, 199, 0.2);
        }

        .option-btn.correct {
            background: #27ae60 !important;
            color: white !important;
            border-color: #2ecc71 !important;
        }

        .option-btn.wrong {
            background: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
        }

        .confirm-btn {
            padding: 18px 45px;
            font-size: 24px;
            font-weight: 900;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-yes { background: #2ecc71; color: white; }
        .btn-no { background: #e74c3c; color: white; }
        .confirm-btn:hover { transform: scale(1.1); }

        .structure.placing {
            z-index: 9999 !important;
            filter: drop-shadow(0 0 30px #f1c40f) !important;
            cursor: move;
        }

        /* NABIZ EFEKTİ */
        .pulse {
            animation: structurePulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 40px #f1c40f) !important;
        }

        @keyframes structurePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* FOTOĞRAF MODALI */
        #photo-modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2100;
            backdrop-filter: blur(10px);
        }
        #photo-modal.show { display: flex; animation: fadeIn 0.4s; }

        .photo-box {
            background: white;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            width: 800px;
            border: 10px solid #f1c40f;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .photo-box h2 { font-size: 42px; margin-bottom: 20px; color: #2c3e50; }
        .photo-box p { font-size: 24px; color: #666; margin-bottom: 40px; }

        .photo-btns {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .photo-btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: 800;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .btn-capture { background: #f1c40f; color: #2c3e50; min-width: 250px; }
        .btn-skip { background: #ecf0f1; color: #7f8c8d; min-width: 250px; }
        .photo-btn:hover { transform: scale(1.05); }
        .photo-btn i { font-size: 40px; }

        /* Final Ekranı */
        .end-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }
        .end-screen.show { display: flex; animation: fadeIn 0.5s; }

        /* KÖPEK MASKOT KALDIRILDI */

        /* KARAKTER SEÇİMİ */
        #char-select-modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 25000; /* Intro üzerinden biraz daha yüksek olsun */
            backdrop-filter: blur(15px);
        }
        #char-select-modal.show { display: flex; animation: fadeIn 0.4s; }

        .char-main-box {
            background: white;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            width: 900px;
            border: 10px solid #0DBFC7;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .char-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }

        .char-card {
            background: #f8f9fa;
            border: 6px solid #e9ecef;
            border-radius: 30px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 300px;
            position: relative;
        }

        .char-card:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: #0DBFC7;
            background: #fff;
            box-shadow: 0 15px 30px rgba(13, 191, 199, 0.2);
        }

        .char-card img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .char-card span {
            font-size: 32px;
            font-weight: 900;
            color: #2c3e50;
        }

        #farmer-char {
            position: absolute;
            width: 280px;
            height: auto;
            bottom: 240px;
            left: 1450px;
            z-index: 22; 
            display: none;
            transition: opacity 0.5s;
        }

        .end-box {
            background: white;
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            max-width: 700px;
            border: 12px solid #0DBFC7;
        }
        .end-box h1 { font-size: 56px; margin-bottom: 20px; color: #0DBFC7; }
        .end-box p { font-size: 28px; color: #666; margin-bottom: 40px; }

        .finish-btn {
            background: #0DBFC7;
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 32px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .finish-btn:hover { background: #0ba8af; transform: scale(1.05); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-area">
            
            <!-- Arka Plan Görseli -->
            <img src="assets/bg_farm.png?v=2" id="bg-img">

            <!-- Çiftlik Yapıları -->

            <img src="assets/windmill.png" id="windmill" class="structure">
            <img src="assets/coop.png" id="coop" class="structure">
            <img src="assets/greenhouse.png" id="greenhouse" class="structure">
            <img src="assets/horse_paddock.png" id="horse_paddock" class="structure">
            <img src="assets/orchard.png" id="orchard" class="structure">
            <img src="assets/farmhouse.png" id="farmhouse" class="structure">
            
            <!-- Seçilen Karakter (Sabit) -->
            <img id="farmer-char">

            <!-- Soru Paneli -->
            <div id="question-panel" data-html2canvas-ignore>
                <div id="question-text">Soru Yükleniyor...</div>
                <div class="options-grid" id="options-container"></div>
            </div>

            <!-- Yerleştirme Talimatı -->
            <div id="instruction-panel" data-html2canvas-ignore>
                <span id="instruction-text"></span>'nı çiftliğinde istediğin yere sürükle.
            </div>

            <!-- Onay Paneli -->
            <div id="confirm-panel" data-html2canvas-ignore>
                <span id="confirm-q" style="font-weight: 800; color: #333; font-size: 24px;">Konumu beğendin mi?</span>
                <button class="confirm-btn btn-yes" onclick="finalizePlacement()">EVET</button>
                <button class="confirm-btn btn-no" onclick="resetPlacement()">HAYIR</button>
            </div>

            <!-- Fotoğraf Çekme Modalı -->
            <div id="photo-modal" data-html2canvas-ignore>
                <div class="photo-box">
                    <h2>📸 Fotoğraf Zamanı!</h2>
                    <p>Çiftliğin harika görünüyor! İstersen bu anı ölümsüzleştirmek için bir fotoğrafını çekebilirsin.</p>
                    <div class="photo-btns">
                        <button class="photo-btn btn-capture" onclick="takePhoto()">
                            <i class="fas fa-camera"></i>
                            Çekmek İstiyorum
                        </button>
                        <button class="photo-btn btn-skip" onclick="skipPhoto()">
                            <i class="fas fa-times"></i>
                            Çekmek İstemiyorum
                        </button>
                    </div>
                </div>
            </div>

            <!-- Karakter Seçim Modalı -->
            <div id="char-select-modal" data-html2canvas-ignore>
                <div class="char-main-box">
                    <h2 style="font-size: 50px; color: #2c3e50; margin-bottom: 10px;">Karakterini Seç!</h2>
                    <p style="font-size: 24px; color: #666;">Çiftliğini hangi kahraman yönetecek?</p>
                    <div class="char-grid">
                        <div class="char-card" onclick="selectCharacter('erkek')">
                            <img src="assets/erkek.png">
                            <span>ERKEK</span>
                        </div>
                        <div class="char-card" onclick="selectCharacter('kız')">
                            <img src="assets/kız.png">
                            <span>KIZ</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bitiş Ekranı -->
            <div class="end-screen" id="end-screen" data-html2canvas-ignore>
                <div class="end-box">
                    <h1>Harika İş Çıkardın!</h1>
                    <p></p>
                    <button class="finish-btn" id="finishButton">Çiftliği Gez / BİTİR</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Konfeti Efekti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Ekran Görüntüsü Kütüphanesi -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- Derslig Core Script -->

    <script src="assets/js/derslig-core.js"></script>

    <script>
        const questions = [
            {
                text: "Değirmenin yapıldığı ahşap direklerin uzunluğu 45 desimetre. Bu uzunluk kaç santimetredir?",
                imageTarget: "windmill",
                displayName: "Değirmen",
                correct: "450 cm",
                options: ["45 cm", "4.5 cm", "450 cm", "4500 cm"]
            },
            {
                text: "Tavuklarımız için 3000 milimetre genişliğinde bir kümes yapıyoruz. Bu kümesin genişliği kaç metredir?",
                imageTarget: "coop",
                displayName: "Kümes",
                correct: "3 m",
                options: ["30 m", "0.3 m", "3 m", "300 m"]
            },
            {
                text: "Seramıza giden tarla yolunun uzunluğu 0.4 kilometre. Bu yol kaç dekametredir?",
                imageTarget: "greenhouse",
                displayName: "Sera",
                correct: "40 dam",
                options: ["4 dam", "40 dam", "400 dam", "0.04 dam"]
            },
            {
                text: "Atlar için yapılacak padok alanının etrafındaki çitlerin uzunluğu 12 hektometre. Bu çit kaç kilometredir?",
                imageTarget: "horse_paddock",
                displayName: "At Çiftliği",
                correct: "1.2 km",
                options: ["1.2 km", "120 km", "0.12 km", "12 km"]
            },
            {
                text: "Bahçemize ekeceğimiz bir elma ağacı fidanının boyu 110 santimetredir. Bu fidanın boyu kaç metredir?",
                imageTarget: "orchard",
                displayName: "Elma Fidanı",
                correct: "1.1 m",
                options: ["11 m", "0.11 m", "110 m", "1.1 m"]
            },
            {
                text: "Çiftlik evimizin çatısının boyu 1500 desimetre. Bu ev kaç dekametredir?",
                imageTarget: "farmhouse",
                displayName: "Çiftlik Evi",
                correct: "15 dam",
                options: ["1.5 dam", "150 dam", "15 dam", "1500 dam"]
            }
        ];

        let currentQuestionIndex = 0;
        let correctCount = 0;
        let isLocked = false;
        let isPlacingMode = false;
        let activeStructure = null;

        window.GLOBAL_CIKIS_LINK = "https://www.derslig.com";
        Derslig.baslat({
            title: "Çiftlik Kuralım",
            info: "Soruları doğru bil, kazandığın binaları çiftliğinde dilediğin yere yerleştir!",
            soruSayisi: questions.length
        });

        function scaleGame() {
            const gameWrapper = document.getElementById("game-wrapper");
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            gameWrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener("resize", scaleGame);
        scaleGame();

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                endGame();
                return;
            }

            isPlacingMode = false;
            activeStructure = null;
            document.getElementById("instruction-panel").style.display = "none";
            document.getElementById("confirm-panel").style.display = "none";
            document.getElementById("question-panel").style.display = "block";

            const q = questions[currentQuestionIndex];
            document.getElementById("question-text").innerText = q.text;
            const container = document.getElementById("options-container");
            container.innerHTML = "";

            let opts = [...q.options];
            opts.sort(() => Math.random() - 0.5);

            opts.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.correct, btn, q.imageTarget);
                container.appendChild(btn);
            });
            isLocked = false;
        }

        function checkAnswer(selected, correct, btn, id) {
            if (isLocked) return;
            isLocked = true;

            if (selected === correct) {
                Derslig.dogru();
                correctCount++;
                btn.classList.add("correct");
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => startPlacement(id), 1500);
            } else {
                Derslig.yanlis();
                btn.classList.add("wrong");
                document.querySelectorAll(".option-btn").forEach(b => {
                    if (b.innerText === correct) b.classList.add("correct");
                });
                setTimeout(() => { currentQuestionIndex++; loadQuestion(); }, 2000);
            }
        }

        function startPlacement(id) {
            document.getElementById("question-panel").style.display = "none";
            const q = questions[currentQuestionIndex];
            document.getElementById("instruction-text").innerText = q.displayName;
            document.getElementById("instruction-panel").style.display = "block";

            activeStructure = document.getElementById(id);
            
            // Ekranın tam ortasına yerleştir (Genişlik/Yükseklik yarısını çıkararak)
            const centerX = 960 - (activeStructure.width / 2);
            const centerY = 500 - (activeStructure.height / 2);
            
            activeStructure.style.left = centerX + "px";
            activeStructure.style.top = centerY + "px";
            activeStructure.classList.add("show", "placing", "pulse");
            isPlacingMode = true;

            setupDrag(activeStructure);
        }

        function setupDrag(el) {
            let isDragging = false;
            let offset = { x: 0, y: 0 };

            const start = (e) => {
                if (!isPlacingMode) return;
                isDragging = true;
                
                // Nabız efektini durdur
                el.classList.remove("pulse");

                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                const areaRect = document.getElementById('game-area').getBoundingClientRect();
                const rect = el.getBoundingClientRect();
                const scale = areaRect.width / 1920;
                offset.x = (clientX - rect.left) / scale;
                offset.y = (clientY - rect.top) / scale;
                document.getElementById("confirm-panel").style.display = "none";
            };

            const move = (e) => {
                if (!isDragging) return;
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                const areaRect = document.getElementById('game-area').getBoundingClientRect();
                const scale = areaRect.width / 1920;
                let x = (clientX - areaRect.left) / scale - offset.x;
                let y = (clientY - areaRect.top) / scale - offset.y;
                x = Math.max(0, Math.min(1920 - el.width, x));
                y = Math.max(0, Math.min(1000 - el.height, y));
                el.style.left = x + 'px';
                el.style.top = y + 'px';
            };

            const end = () => {
                if (!isDragging) return;
                isDragging = false;
                document.getElementById("confirm-panel").style.display = "flex";
            };

            el.onmousedown = start;
            el.ontouchstart = start;
            document.onmousemove = move;
            document.ontouchmove = move;
            document.onmouseup = end;
            document.ontouchend = end;
        }

        function finalizePlacement() {
            activeStructure.classList.remove("placing");
            activeStructure.onmousedown = null;
            activeStructure.ontouchstart = null;
            isPlacingMode = false;
            currentQuestionIndex++;
            loadQuestion();
        }

        function resetPlacement() {
            document.getElementById("confirm-panel").style.display = "none";
        }

        function showConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function endGame() {
            // İlk önce fotoğraf modallını açalım
            document.getElementById("question-panel").style.display = "none";
            document.getElementById("photo-modal").classList.add("show");
        }

        async function takePhoto() {
            const btn = document.querySelector(".btn-capture");
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Fotoğraf İşleniyor...`;
            btn.disabled = true;

            const modal = document.getElementById("photo-modal");
            modal.style.display = "none"; 

            setTimeout(async () => {
                const gameArea = document.getElementById("game-area");
                const canvas = await html2canvas(gameArea, {
                    useCORS: true,
                    scale: 2,
                    backgroundColor: null,
                    ignoreElements: (node) => node.hasAttribute('data-html2canvas-ignore')
                });

                const dataUrl = canvas.toDataURL("image/png");
                const blob = await (await fetch(dataUrl)).blob();
                const fileName = "benim_ciftligim.png";

                try {
                    // 1. Desktop: "Farklı Kaydet" Penceresi (File System Access API)
                    if (window.showSaveFilePicker) {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: fileName,
                            types: [{
                                description: 'PNG Image',
                                accept: {'image/png': ['.png']},
                            }],
                        });
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                    } 
                    // 2. Mobile: "Paylaş" Menüsü (Web Share API)
                    else if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, { type: blob.type })] })) {
                        const file = new File([blob], fileName, { type: blob.type });
                        await navigator.share({
                            files: [file],
                            title: 'Benim Çiftliğim',
                            text: 'Bakın, matematik sorularını çözerek kendi çiftliğimi kurdum!'
                        });
                    }
                    // 3. Fallback: Standart İndirme
                    else {
                        const link = document.createElement("a");
                        link.download = fileName;
                        link.href = dataUrl;
                        link.click();
                    }
                } catch (err) {
                    console.log("Kullanıcı iptal etti veya bir hata oluştu:", err);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-camera"></i> Çekmek İstiyorum`;
                    showFinalResult();
                }
            }, 100);
        }


        function skipPhoto() {
            document.getElementById("photo-modal").classList.remove("show");
            showFinalResult();
        }

        function showFinalResult() {
            const endScreen = document.getElementById("end-screen");
            const p = endScreen.querySelector("p");
            const h1 = endScreen.querySelector("h1");

            if (correctCount < questions.length) {
                h1.innerText = "Oyun Bitti!";
                h1.style.color = "#e67e22";
                p.innerText = "Çiftliğinde eksiklerin var! Bir dahaki sefere tüm binaları kazanmaya çalış.";
            } else {
                h1.innerText = "Harika İş Çıkardın!";
                p.innerText = "Çiftliğini eksiksiz bir şekilde tamamladın!";
            }
            endScreen.classList.add("show");
        }

        document.getElementById("finishButton").onclick = () => {
            document.getElementById("finishButton").innerText = "Yükleniyor...";
            Derslig.bitir();
        };

        window.onload = () => {
            // Spritesheet sayfalarını önceden yükleyerek flicker'ı engelle
            for(let i=1; i<=4; i++) {
                const img = new Image();
                img.src = `assets/spritesheet_page_${i}e.webp`;
            }
        };

        window.addEventListener('derslig-basla', () => {
             document.getElementById("char-select-modal").classList.add("show");
        });

        let farmerInterval = null;
        let currentFarmerFrame = 0;
        const totalFarmerFrames = 80;
        const farmerFramesPerPage = 20;

        function selectCharacter(gender) {
            const charImg = document.getElementById("farmer-char");
            const fileName = (gender === 'kız') ? 'kız.png' : 'erkek.png';
            charImg.src = `assets/${fileName}`;
            charImg.style.display = "block";
            
            document.getElementById("char-select-modal").classList.remove("show");
            loadQuestion();
        }

        // KÖPEK ANİMASYON MOTORU KALDIRILDI

        const obs = new MutationObserver(() => {
            if (document.querySelector('.swal2-container')) isLocked = true;
        });
        obs.observe(document.body, { attributes: true, subtree: true, childList: true });
    </script>
</body>
</html>
